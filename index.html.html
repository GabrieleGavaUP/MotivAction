<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WBS — MotivAction · MindSpark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.14);
    --text: #1A1814;
    --muted: #6B6760;
    --faint: #A8A49E;
    --accent: #2D2A24;
    --radius: 10px;
    --radius-lg: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .page {
    max-width: 780px;
    margin: 0 auto;
  }

  /* Header */
  .site-header {
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 0.5px solid var(--border-strong);
  }

  .eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--faint);
    margin-bottom: 0.6rem;
    font-family: 'DM Mono', monospace;
  }

  .site-header h1 {
    font-size: 28px;
    font-weight: 300;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 0.3rem;
  }

  .site-header h1 em {
    font-style: italic;
    font-weight: 300;
  }

  .site-header h1 strong {
    font-weight: 500;
  }

  .meta-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-top: 0.9rem;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    padding: 3px 9px;
    border-radius: 20px;
    border: 0.5px solid var(--border-strong);
    color: var(--muted);
    background: var(--surface);
  }

  .stat-pill {
    font-size: 11px;
    color: var(--faint);
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 6px;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 400;
    padding: 5px 12px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border-strong);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn:hover {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }

  /* Tree */
  .tree {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  /* Macro */
  .macro {
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: var(--surface);
    transition: box-shadow 0.2s;
  }

  .macro:hover {
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .macro-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 14px;
    cursor: pointer;
    user-select: none;
  }

  .macro-header:hover .macro-num {
    opacity: 1;
  }

  .macro-num {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 20px;
    min-width: 30px;
    text-align: center;
    opacity: 0.85;
    transition: opacity 0.15s;
  }

  .macro-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
  }

  .macro-count {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--faint);
  }

  .chevron {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    color: var(--faint);
    transition: transform 0.2s;
  }

  .chevron.open {
    transform: rotate(180deg);
  }

  /* Children */
  .children {
    padding: 4px 6px 8px 14px;
    border-top: 0.5px solid var(--border);
    background: #FDFCFA;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .l2-wrap {}

  .l2 {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-radius: 8px;
    cursor: default;
    transition: background 0.1s;
  }

  .l2.has-children {
    cursor: pointer;
  }

  .l2:hover {
    background: rgba(0,0,0,0.03);
  }

  .l2-num {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--faint);
    min-width: 30px;
  }

  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .l2-title {
    font-size: 13px;
    color: var(--text);
    flex: 1;
  }

  .l2-chevron {
    width: 13px;
    height: 13px;
    color: var(--faint);
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .l2-chevron.open {
    transform: rotate(180deg);
  }

  .l3-wrap {
    padding-left: 52px;
    display: flex;
    flex-direction: column;
    gap: 1px;
    padding-bottom: 4px;
  }

  .l3 {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 8px;
    border-radius: 6px;
  }

  .l3:hover {
    background: rgba(0,0,0,0.03);
  }

  .l3-num {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--faint);
    min-width: 38px;
  }

  .dot3 {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    flex-shrink: 0;
    opacity: 0.5;
  }

  .l3-title {
    font-size: 12px;
    color: var(--muted);
  }

  .l4-wrap {
    padding-left: 66px;
    display: flex;
    flex-direction: column;
    gap: 1px;
    padding-bottom: 3px;
  }

  .l4 {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 8px;
    border-radius: 6px;
  }

  .l4:hover {
    background: rgba(0,0,0,0.03);
  }

  .l4-num {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--faint);
    min-width: 46px;
  }

  .l4-title {
    font-size: 11px;
    color: var(--faint);
  }

  /* Footer */
  .site-footer {
    margin-top: 3rem;
    padding-top: 1.25rem;
    border-top: 0.5px solid var(--border);
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--faint);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  @media (max-width: 600px) {
    .site-header h1 { font-size: 22px; }
    body { padding: 1.25rem 0.75rem 3rem; }
  }
</style>
</head>
<body>
<div class="page">

  <header class="site-header">
    <p class="eyebrow">UniPi · MindSpark · PSPSAS 2025–26</p>
    <h1>Work Breakdown <em>Structure</em> — <strong>MotivAction</strong></h1>
    <div class="meta-row">
      <span class="badge">HAlt app</span>
      <span class="stat-pill" id="meta-line">— nodi totali</span>
    </div>
  </header>

  <div class="controls">
    <button class="btn" onclick="expandAll()">Espandi tutto</button>
    <button class="btn" onclick="collapseL2()">Comprimi L3+</button>
    <button class="btn" onclick="collapseAll()">Comprimi tutto</button>
  </div>

  <div class="tree" id="tree"></div>

  <footer class="site-footer">
    <span>MotivAction · MindSpark</span>
    <span>PSPSAS 2025–26</span>
  </footer>

</div>

<script>
const COLORS = [
  { bg: '#F5F3FE', numBg: '#E8E5FC', numText: '#3C3489', dot: '#7F77DD' },
  { bg: '#F0FAF5', numBg: '#D5F0E5', numText: '#085041', dot: '#1D9E75' },
  { bg: '#FEF4F0', numBg: '#FAE0D4', numText: '#712B13', dot: '#D85A30' },
  { bg: '#FDF2F6', numBg: '#F8D9E6', numText: '#72243E', dot: '#D4537E' },
  { bg: '#F0F7FE', numBg: '#D4E8F9', numText: '#0C447C', dot: '#378ADD' },
  { bg: '#FEF8EE', numBg: '#FDE9C0', numText: '#633806', dot: '#BA7517' },
  { bg: '#F2F9E8', numBg: '#D8EDB8', numText: '#27500A', dot: '#639922' },
  { bg: '#FEF1F1', numBg: '#FBCDCD', numText: '#791F1F', dot: '#E24B4A' },
  { bg: '#F0F7FE', numBg: '#D4E8F9', numText: '#0C447C', dot: '#378ADD' },
  { bg: '#F5F3FE', numBg: '#E8E5FC', numText: '#3C3489', dot: '#7F77DD' },
  { bg: '#F0FAF5', numBg: '#D5F0E5', numText: '#085041', dot: '#1D9E75' },
  { bg: '#FEF8EE', numBg: '#FDE9C0', numText: '#633806', dot: '#BA7517' },
  { bg: '#FEF4F0', numBg: '#FAE0D4', numText: '#712B13', dot: '#D85A30' },
];

const DATA = [
  {num:'1',title:'Project Management',children:[
    {num:'1.1',title:'Contesto del Problema'},
    {num:'1.2',title:'Obiettivo'},
    {num:'1.3',title:'Metodologia'},
    {num:'1.4',title:'Strumenti',children:[
      {num:'1.4.1',title:'WBS'},
      {num:'1.4.2',title:'RACI'},
    ]},
  ]},
  {num:'2',title:'La Motivazione',children:[
    {num:'2.1',title:'Etimologia della Parola'},
    {num:'2.2',title:'Analisi della Letteratura',children:[
      {num:'2.2.1',title:'Libri di Testo'},
      {num:'2.2.2',title:'Articoli Scientifici su Scopus — Analisi con R'},
    ]},
    {num:'2.3',title:'Definizione Operativa di Motivazione'},
  ]},
  {num:'3',title:'Scope 0',children:[
    {num:'3.1',title:'Scope Statement',children:[
      {num:'3.1.1',title:'In Scope / Out of Scope'},
    ]},
  ]},
  {num:'4',title:'Ricerca delle Opportunità',children:[
    {num:'4.1',title:'Analisi del Contesto Esterno: PESTL',children:[
      {num:'4.1.1',title:'Fattori Politici'},
      {num:'4.1.2',title:'Fattori Economici'},
      {num:'4.1.3',title:'Fattori Sociali'},
      {num:'4.1.4',title:'Fattori Tecnologici'},
      {num:'4.1.5',title:'Fattori Legali'},
    ]},
  ]},
  {num:'5',title:'Mappatura del Processo di Studio',children:[
    {num:'5.1',title:'Framework Teorici di Riferimento'},
    {num:'5.2',title:'Mappatura del Processo Ideale di Studio'},
    {num:'5.3',title:'Analisi PFMEA',children:[
      {num:'5.3.1',title:'Introduzione e Scelta Metodologica'},
      {num:'5.3.2',title:'Griglia di Valutazione e Criterio di Motivazione'},
      {num:'5.3.3',title:'Risultati Principali'},
      {num:'5.3.4',title:'La Componente Motivazionale: Dipendenza e Costi di Riattivazione'},
    ]},
    {num:'5.4',title:'Catene Causali da Reddit',children:[
      {num:'5.4.1',title:'Perché Reddit come Fonte'},
      {num:'5.4.2',title:'La Pipeline di Ricerca e Analisi'},
      {num:'5.4.3',title:'I Cluster di Cause: Lettura dei Dati'},
    ]},
    {num:'5.5',title:'Incrocio Cause Reddit — Attività Critiche PFMEA',children:[
      {num:'5.5.1',title:'La Logica dell\'Incrocio'},
      {num:'5.5.2',title:'Risultati'},
    ]},
    {num:'5.6',title:'Loop Motivazionale',children:[
      {num:'5.6.1',title:'La Propagazione degli Effetti'},
      {num:'5.6.2',title:'Il Loop Motivazionale Negativo'},
    ]},
    {num:'5.7',title:'Opportunità di Mercato'},
  ]},
  {num:'6',title:'Scope 1',children:[
    {num:'6.1',title:'Dalla Ricerca dell\'Opportunità allo Scope 1'},
    {num:'6.2',title:'Scope Statement',children:[
      {num:'6.2.1',title:'In Scope / Out of Scope'},
    ]},
  ]},
  {num:'7',title:'Analisi di Fattibilità',children:[
    {num:'7.1',title:'Bisogni e Requisiti'},
    {num:'7.2',title:'Le Tre Soluzioni Candidate'},
    {num:'7.3',title:'Fattibilità Tecnologica'},
    {num:'7.4',title:'Fattibilità Economica'},
    {num:'7.5',title:'Fattibilità Legale'},
    {num:'7.6',title:'La Soluzione Selezionata: HALT'},
  ]},
  {num:'8',title:'Quality Function Deployment (QFD)',children:[
    {num:'8.1',title:'Stanza 1 — Voce del Cliente',children:[
      {num:'8.1.1',title:'Le Interviste'},
      {num:'8.1.2',title:'Diagramma di Affinità e Bisogni Sintetici'},
      {num:'8.1.3',title:'Caratterizzazione Kano'},
    ]},
    {num:'8.2',title:'Stanza 2 — Requisiti di Prodotto'},
    {num:'8.3',title:'Stanza 3 — Matrice delle Relazioni'},
    {num:'8.4',title:'Stanza 4 — Benchmarking Percezioni del Cliente'},
    {num:'8.5',title:'Stanza 6 — Matrice di Correlazione'},
    {num:'8.6',title:'Stanza 7 — Importanza Relativa'},
    {num:'8.7',title:'Stanza 8 — Specifiche e Target'},
  ]},
  {num:'9',title:'Architettura, Componenti e Analisi dei Costi',children:[
    {num:'9.1',title:'Componenti'},
    {num:'9.2',title:'Stima dei Costi',children:[
      {num:'9.2.1',title:'Costi di Sviluppo'},
      {num:'9.2.2',title:'Costi di Servizio'},
      {num:'9.2.3',title:'Costi di Manutenzione'},
      {num:'9.2.4',title:'TCO Riepilogativo per Componente'},
    ]},
    {num:'9.3',title:'Matrice Engineering Solutions e Valore Relativo'},
    {num:'9.4',title:'Analisi di Tanaka'},
  ]},
  {num:'10',title:'Analisi Funzionale e PFMECA',children:[
    {num:'10.1',title:'Analisi Funzionale'},
    {num:'10.2',title:'PFMECA'},
    {num:'10.3',title:'Considerazioni'},
  ]},
  {num:'11',title:'Business Model',children:[
    {num:'11.1',title:'Fase Esplorativa'},
    {num:'11.2',title:'Confronto tra Modelli'},
  ]},
  {num:'12',title:'Strategic Foresight',children:[
    {num:'12.1',title:'Scanning STEEP'},
    {num:'12.2',title:'Scenari 2036'},
    {num:'12.3',title:'Scelte Strategiche di Breve Periodo'},
    {num:'12.4',title:'Visioning e Roadmap'},
    {num:'12.5',title:'Considerazioni Finali'},
  ]},
  {num:'13',title:'Bibliografia e Sitografia',children:[]},
];

const state = { open: {}, openL2: {} };

function countNodes(node) {
  let c = 1;
  if (node.children) node.children.forEach(ch => { c += countNodes(ch); });
  return c;
}

function chevronSVG(cls) {
  return `<svg class="chevron ${cls}" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4,6 8,10 12,6"/></svg>`;
}

function chevronSmSVG(cls) {
  return `<svg class="l2-chevron ${cls}" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,5 6.5,8.5 10,5"/></svg>`;
}

function render() {
  const tree = document.getElementById('tree');
  tree.innerHTML = '';

  let total = 0;
  DATA.forEach(d => { total += countNodes(d); });
  document.getElementById('meta-line').textContent = `${DATA.length} macro-aree · ${total} nodi totali`;

  DATA.forEach((macro, i) => {
    const c = COLORS[i % COLORS.length];
    const isOpen = state.open[macro.num] !== false;
    const childCount = macro.children ? macro.children.length : 0;

    const div = document.createElement('div');
    div.className = 'macro';

    const header = document.createElement('div');
    header.className = 'macro-header';
    header.style.background = c.bg;
    header.innerHTML = `
      <span class="macro-num" style="background:${c.numBg};color:${c.numText}">${macro.num}</span>
      <span class="macro-title">${macro.title}</span>
      ${childCount ? `<span class="macro-count">${childCount} wp</span>` : ''}
      ${childCount ? chevronSVG(isOpen ? 'open' : '') : ''}
    `;
    if (childCount) {
      header.style.cursor = 'pointer';
      header.onclick = () => { state.open[macro.num] = !isOpen; render(); };
    }
    div.appendChild(header);

    if (isOpen && macro.children && macro.children.length) {
      const ch = document.createElement('div');
      ch.className = 'children';

      macro.children.forEach(l2 => {
        const l2open = state.openL2[l2.num] !== false;
        const hasL3 = l2.children && l2.children.length;

        const l2wrap = document.createElement('div');
        l2wrap.className = 'l2-wrap';

        const row = document.createElement('div');
        row.className = 'l2' + (hasL3 ? ' has-children' : '');
        row.innerHTML = `
          <span class="l2-num">${l2.num}</span>
          <span class="dot" style="background:${c.dot}"></span>
          <span class="l2-title">${l2.title}</span>
          ${hasL3 ? chevronSmSVG(l2open ? 'open' : '') : ''}
        `;
        if (hasL3) {
          row.onclick = () => { state.openL2[l2.num] = !l2open; render(); };
        }
        l2wrap.appendChild(row);

        if (hasL3 && l2open) {
          const l3w = document.createElement('div');
          l3w.className = 'l3-wrap';
          l2.children.forEach(l3 => {
            const l3row = document.createElement('div');
            l3row.className = 'l3';
            l3row.innerHTML = `<span class="l3-num">${l3.num}</span><span class="dot3" style="background:${c.dot}"></span><span class="l3-title">${l3.title}</span>`;
            l3w.appendChild(l3row);
            if (l3.children && l3.children.length) {
              const l4w = document.createElement('div');
              l4w.className = 'l4-wrap';
              l3.children.forEach(l4 => {
                const l4row = document.createElement('div');
                l4row.className = 'l4';
                l4row.innerHTML = `<span class="l4-num">${l4.num}</span><span class="l4-title">${l4.title}</span>`;
                l4w.appendChild(l4row);
              });
              l3w.appendChild(l4w);
            }
          });
          l2wrap.appendChild(l3w);
        }
        ch.appendChild(l2wrap);
      });
      div.appendChild(ch);
    }
    tree.appendChild(div);
  });
}

function expandAll() {
  DATA.forEach(d => {
    state.open[d.num] = true;
    if (d.children) d.children.forEach(l2 => { state.openL2[l2.num] = true; });
  });
  render();
}

function collapseL2() {
  DATA.forEach(d => {
    state.open[d.num] = true;
    if (d.children) d.children.forEach(l2 => { state.openL2[l2.num] = false; });
  });
  render();
}

function collapseAll() {
  DATA.forEach(d => { state.open[d.num] = false; });
  render();
}

DATA.forEach(d => { state.open[d.num] = false; });
render();
</script>
</body>
</html>
